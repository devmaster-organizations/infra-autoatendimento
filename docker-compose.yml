services:
  postgres:
    image: postgres:17
    container_name: infra-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-autoatendimento}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-autoatendimento}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - infra-net

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "backend@fatec.com" 
      PGADMIN_DEFAULT_PASSWORD: "password"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - infra-net

  api:
    build:
      context: ./backend
      dockerfile: infra/Dockerfile
      target: builder
    container_name: infra-api
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-autoatendimento}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    command: >
      sh -c "npm run prisma:generate &&
      npx prisma migrate deploy &&
      if [ -f prisma/seed.ts ]; then npx tsx prisma/seed.ts; elif [ -f prisma/seed.js ]; then node prisma/seed.js; else echo 'No seed file found, skipping seed.'; fi &&
      npm run start"
    networks:
      - infra-net

  frontend:
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    container_name: infra-frontend
    environment:
      API_BASE_URL: http://infra-api:3000/api
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - infra-net

volumes:
  pgdata:

networks:
  infra-net:
    name: infra-net
