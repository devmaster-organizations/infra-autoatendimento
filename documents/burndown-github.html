<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burndown - GitHub Project V2</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1f4d8f 0%, #2a7f62 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 12px 38px rgba(0, 0, 0, 0.22);
      padding: 24px;
    }
    h1 { font-size: 28px; color: #123; margin-bottom: 4px; }
    .subtitle { color: #556; margin-bottom: 20px; }
    .panel {
      background: #f5f8fb;
      border-left: 5px solid #1f4d8f;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
    }
    label { font-size: 12px; color: #345; font-weight: 700; margin-bottom: 4px; display: block; }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #c8d6e5;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      border: 0;
      background: #1f4d8f;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: 120ms ease;
    }
    button:hover { transform: translateY(-1px); background: #173c70; }
    button:disabled { opacity: 0.65; cursor: not-allowed; }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #4e5f73;
      line-height: 1.45;
      background: #eaf1f7;
      border-radius: 8px;
      padding: 10px;
    }
    .hidden { display: none; }
    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
    }
    .status.ok { background: #e7f7ed; color: #1e6a3f; border-left: 4px solid #24a160; }
    .status.warn { background: #fff4df; color: #845b08; border-left: 4px solid #d9a21f; }
    .status.err { background: #fde8ea; color: #8a2530; border-left: 4px solid #d03b4d; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin: 16px 0;
    }
    .card {
      background: #fff;
      border: 1px solid #dbe5ef;
      border-radius: 10px;
      padding: 12px;
    }
    .card .k { font-size: 11px; color: #5d6e81; text-transform: uppercase; font-weight: 700; }
    .card .v { font-size: 24px; color: #123; font-weight: 800; margin-top: 4px; }
    .chartWrap {
      background: #f5f8fb;
      border-left: 5px solid #2a7f62;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .chartBox { height: 380px; }
    .tableWrap {
      overflow: auto;
      border: 1px solid #dbe5ef;
      border-radius: 10px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      background: #1f4d8f;
      color: white;
      padding: 10px;
      position: sticky;
      top: 0;
    }
    td { padding: 10px; border-bottom: 1px solid #eef3f8; }
    tr.done { background: #f7fbf8; opacity: 0.8; }
    .badge {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
    .b-done { background: #d7f2e3; color: #185b38; }
    .b-open { background: #ffe9be; color: #805400; }
    .loader {
      width: 22px;
      height: 22px;
      border: 3px solid #d7e4f0;
      border-top-color: #1f4d8f;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Burndown do Project V2</h1>
    <p class="subtitle">Conexao direta ao kanban do GitHub (ABP-02), exibindo todos os cards para validacao.</p>

    <section class="panel">
      <div class="grid">
        <div>
          <label>Token</label>
          <input type="text" value="Configurado no codigo" disabled />
        </div>
        <div>
          <label>Owner (org/user)</label>
          <input id="owner" type="text" value="devmaster-organizations" />
        </div>
        <div>
          <label>Project Number</label>
          <input id="projectNumber" type="number" value="1" min="1" />
        </div>
        <div>
          <label>Repo alvo (filtro)</label>
          <input id="repo" type="text" value="ABP-02" />
        </div>
        <div>
          <label>Inicio Sprint</label>
          <input id="startDate" type="date" value="2026-05-08" />
        </div>
        <div>
          <label>Fim Sprint</label>
          <input id="endDate" type="date" value="2026-05-22" />
        </div>
        <div>
          <button id="btnLoad" onclick="loadProjectBurndown()">Carregar Project</button>
        </div>
      </div>
      <div class="hint">
        Token configurado internamente no script.<br />
        Esta visualizacao exibe todos os cards do project para validar retorno da API.
      </div>
      <div id="status" class="status hidden"></div>
    </section>

    <section id="results" class="hidden">
      <div class="stats" id="stats"></div>

      <div class="chartWrap">
        <div class="chartBox"><canvas id="chart"></canvas></div>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Titulo</th>
              <th>Tipo</th>
              <th>Pontos</th>
              <th>Status</th>
              <th>Status(Project)</th>
              <th>Labels</th>
              <th>Fechado em</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    let chart;
    // Nao commitar credenciais reais. Informe token manualmente no navegador ao executar local.
    const HARDCODED_GITHUB_TOKEN = "";

    function setStatus(kind, text) {
      const el = document.getElementById("status");
      el.className = `status ${kind}`;
      el.textContent = text;
      el.classList.remove("hidden");
    }

    function clearStatus() {
      const el = document.getElementById("status");
      el.className = "status hidden";
      el.textContent = "";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function toISODate(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function daysBetween(start, end) {
      const one = 24 * 60 * 60 * 1000;
      return Math.floor((end - start) / one);
    }

    function extractPoints(title, body) {
      const txt = `${title || ""} ${body || ""}`;
      const patterns = [
        /(\d+)\s*pts?/i,
        /pontos?\s*:?\s*(\d+)/i,
        /\[(\d+)\s*pts?\]/i
      ];
      for (const p of patterns) {
        const m = txt.match(p);
        if (m) return Math.max(1, parseInt(m[1], 10));
      }
      return 5;
    }

    function normalizeFieldValues(nodes) {
      return (nodes || []).map((n) => ({
        fieldName: n && n.field && n.field.name ? String(n.field.name).toLowerCase() : "",
        single: n && n.name ? n.name : null,
        number: typeof n.number === "number" ? n.number : null,
        date: n && n.date ? n.date : null,
        iteration: n && n.title ? n.title : null
      }));
    }

    function getFieldValue(fields, names) {
      const wanted = names.map((x) => x.toLowerCase());
      const hit = fields.find((f) => wanted.includes(f.fieldName));
      if (!hit) return null;
      return hit.single || hit.iteration || hit.date || null;
    }

    function getNumericFieldValue(fields, names) {
      const wanted = names.map((x) => x.toLowerCase());
      const hit = fields.find((f) => wanted.includes(f.fieldName) && typeof f.number === "number");
      return hit ? Math.max(1, Math.round(hit.number)) : null;
    }

    async function fetchProjectItems(token, owner, projectNumber) {
      const query = `
        query ProjectItems($owner: String!, $number: Int!, $after: String) {
          organization(login: $owner) {
            projectV2(number: $number) {
              items(first: 100, after: $after) {
                pageInfo { hasNextPage endCursor }
                nodes {
                  id
                  fieldValues(first: 40) {
                    nodes {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name
                        field { ... on ProjectV2SingleSelectField { name } }
                      }
                      ... on ProjectV2ItemFieldNumberValue {
                        number
                        field { ... on ProjectV2FieldCommon { name } }
                      }
                      ... on ProjectV2ItemFieldDateValue {
                        date
                        field { ... on ProjectV2FieldCommon { name } }
                      }
                      ... on ProjectV2ItemFieldIterationValue {
                        title
                        startDate
                        duration
                        field { ... on ProjectV2FieldCommon { name } }
                      }
                    }
                  }
                  content {
                    __typename
                    ... on Issue {
                      number
                      title
                      state
                      createdAt
                      closedAt
                      url
                      body
                      repository { name }
                      labels(first: 20) { nodes { name } }
                    }
                    ... on DraftIssue {
                      title
                      body
                      createdAt
                    }
                  }
                }
              }
            }
          }
          user(login: $owner) {
            projectV2(number: $number) {
              items(first: 100, after: $after) {
                pageInfo { hasNextPage endCursor }
                nodes {
                  id
                  fieldValues(first: 40) {
                    nodes {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name
                        field { ... on ProjectV2SingleSelectField { name } }
                      }
                      ... on ProjectV2ItemFieldNumberValue {
                        number
                        field { ... on ProjectV2FieldCommon { name } }
                      }
                      ... on ProjectV2ItemFieldDateValue {
                        date
                        field { ... on ProjectV2FieldCommon { name } }
                      }
                    }
                  }
                  content {
                    __typename
                    ... on Issue {
                      number
                      title
                      state
                      createdAt
                      closedAt
                      url
                      body
                      repository { name }
                      labels(first: 20) { nodes { name } }
                    }
                    ... on DraftIssue {
                      title
                      body
                      createdAt
                    }
                  }
                }
              }
            }
          }
        }
      `;

      const headers = {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json",
        "Accept": "application/vnd.github+json"
      };

      let all = [];
      let after = null;
      let hasNext = true;

      while (hasNext) {
        const res = await fetch("https://api.github.com/graphql", {
          method: "POST",
          headers,
          body: JSON.stringify({ query, variables: { owner, number: projectNumber, after } })
        });

        if (!res.ok) throw new Error(`GitHub GraphQL: ${res.status} ${res.statusText}`);

        const payload = await res.json();

        const orgProj = payload.data && payload.data.organization ? payload.data.organization.projectV2 : null;
        const userProj = payload.data && payload.data.user ? payload.data.user.projectV2 : null;
        const proj = orgProj || userProj;

        if (!proj && payload.errors && payload.errors.length) {
          throw new Error(payload.errors.map((e) => e.message).join(" | "));
        }

        if (!proj) throw new Error("Project V2 nao encontrado. Verifique owner e project number.");

        const items = proj.items.nodes || [];
        all = all.concat(items);
        hasNext = proj.items.pageInfo.hasNextPage;
        after = proj.items.pageInfo.endCursor;
      }

      return all;
    }

    function parseProjectItems(items, repoFilter) {
      const wantedRepo = (repoFilter || "").trim().toUpperCase();

      return items.map((item) => {
        const c = item.content || {};
        const isIssue = c.__typename === "Issue";
        const labels = isIssue && c.labels ? c.labels.nodes.map((n) => n.name) : [];
        const fields = normalizeFieldValues(item.fieldValues ? item.fieldValues.nodes : []);
        const typeField = getFieldValue(fields, ["type", "tipo"]);
        const statusField = getFieldValue(fields, ["status", "estado"]);
        const pointsField = getNumericFieldValue(fields, ["story points", "points", "pontos"]);

        const title = c.title || "";
        const body = c.body || "";
        const repoName = isIssue && c.repository ? c.repository.name.toUpperCase() : "";

        const matchesRepo = !wantedRepo || repoName === wantedRepo;
        if (!matchesRepo) return null;

        const hasUSLabel = labels.some((x) => String(x).toUpperCase() === "US");
        const hasUSTitle = title.toUpperCase().includes("[US]") || title.toUpperCase().startsWith("US ");
        const hasUSType = String(typeField || "").toUpperCase() === "US";
        const cardType = typeField || (hasUSType || hasUSLabel || hasUSTitle ? "US" : "OUTRO");

        const doneByIssue = isIssue && String(c.state).toUpperCase() === "CLOSED";
        const doneByStatus = /done|feito|conclu/i.test(String(statusField || ""));
        const done = doneByIssue || doneByStatus;

        return {
          id: isIssue ? String(c.number) : item.id.slice(0, 8),
          title,
          card_type: cardType,
          points: pointsField || extractPoints(title, body),
          done,
          closed_at: isIssue ? c.closedAt : null,
          project_status: statusField || "-",
          labels: labels,
          url: isIssue ? c.url : "#"
        };
      }).filter(Boolean);
    }

    function buildBurndown(tasks, startDateStr, endDateStr) {
      const start = new Date(startDateStr + "T00:00:00");
      const end = new Date(endDateStr + "T00:00:00");
      const totalDays = daysBetween(start, end) + 1;
      const totalPoints = tasks.reduce((s, t) => s + t.points, 0);

      const closedByDay = {};
      tasks.forEach((t) => {
        if (t.done && t.closed_at) {
          const closed = new Date(t.closed_at);
          if (closed >= start && closed <= end) {
            const d = daysBetween(start, new Date(toISODate(closed) + "T00:00:00"));
            closedByDay[d] = (closedByDay[d] || 0) + t.points;
          }
        }
      });

      let cumulative = 0;
      const daily = [];
      for (let d = 0; d <= totalDays; d++) {
        cumulative += (closedByDay[d] || 0);
        const rem = Math.max(0, totalPoints - cumulative);
        const dayDate = new Date(start);
        dayDate.setDate(start.getDate() + d);
        daily.push({ day: d, remaining: rem, completed: cumulative, date: toISODate(dayDate) });
      }

      return { totalDays, totalPoints, tasks, daily };
    }

    function renderStats(model) {
      const last = model.daily[model.daily.length - 1];
      const completed = last.completed;
      const remaining = last.remaining;
      const progress = model.totalPoints > 0 ? ((completed / model.totalPoints) * 100).toFixed(1) : "0.0";
      const velocity = model.daily.length > 1 ? (completed / (model.daily.length - 1)).toFixed(1) : "0.0";

      const health = remaining === 0
        ? { kind: "ok", msg: "Sprint concluida." }
        : remaining / Math.max(1, model.totalPoints) > 0.3
          ? { kind: "err", msg: "Sprint atrasada (restante alto para o periodo)." }
          : { kind: "warn", msg: "Sprint em andamento, monitorar ritmo." };

      const stats = [
        ["Total pontos", model.totalPoints],
        ["Concluidos", completed],
        ["Restantes", remaining],
        ["Progresso", `${progress}%`],
        ["Velocidade", `${velocity} pts/dia`],
        ["Cards", model.tasks.length]
      ];

      const root = document.getElementById("stats");
      root.innerHTML = stats.map(([k, v]) => `
        <div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>
      `).join("");

      setStatus(health.kind, health.msg);
    }

    function renderTable(tasks) {
      const tbody = document.getElementById("tbody");
      tbody.innerHTML = tasks.map((t) => `
        <tr class="${t.done ? "done" : ""}">
          <td>#${escapeHtml(t.id)}</td>
          <td>${t.url && t.url !== "#" ? `<a href="${escapeHtml(t.url)}" target="_blank">${escapeHtml(t.title)}</a>` : escapeHtml(t.title)}</td>
          <td>${escapeHtml(t.card_type || "-")}</td>
          <td>${t.points}</td>
          <td><span class="badge ${t.done ? "b-done" : "b-open"}">${t.done ? "Concluido" : "Aberto"}</span></td>
          <td>${escapeHtml(t.project_status || "-")}</td>
          <td>${escapeHtml((t.labels || []).join(", ") || "-")}</td>
          <td>${t.closed_at ? new Date(t.closed_at).toLocaleDateString("pt-BR") : "-"}</td>
        </tr>
      `).join("");
    }

    function renderChart(model) {
      const labels = model.daily.map((x) => `Dia ${x.day}`);
      const real = model.daily.map((x) => x.remaining);
      const ideal = model.daily.map((_, i) => Math.max(0, model.totalPoints * (model.totalDays - i) / model.totalDays));
      const avgSlope = model.daily.length > 1 ? (real[0] - real[real.length - 1]) / (model.daily.length - 1) : 0;
      const avgLine = model.daily.map((_, i) => Math.max(0, real[0] - avgSlope * i));

      const ctx = document.getElementById("chart").getContext("2d");
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "Ideal", data: ideal, borderColor: "#30a46c", borderDash: [6, 5], fill: false, tension: 0, pointRadius: 2 },
            { label: "Velocidade media", data: avgLine, borderColor: "#d97706", borderDash: [3, 3], fill: false, tension: 0, pointRadius: 0 },
            { label: "Real", data: real, borderColor: "#1f4d8f", backgroundColor: "rgba(31,77,143,0.12)", fill: true, tension: 0.35, pointRadius: 4 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: "top" } },
          scales: { y: { beginAtZero: true, suggestedMax: model.totalPoints } }
        }
      });
    }

    async function loadProjectBurndown() {
      const btn = document.getElementById("btnLoad");
      const token = HARDCODED_GITHUB_TOKEN.trim();
      const owner = document.getElementById("owner").value.trim();
      const projectNumber = parseInt(document.getElementById("projectNumber").value, 10);
      const repo = document.getElementById("repo").value.trim();
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;

      if (!token) return setStatus("err", "Configure HARDCODED_GITHUB_TOKEN no codigo.");
      if (!owner) return setStatus("err", "Informe o owner.");
      if (!projectNumber || projectNumber < 1) return setStatus("err", "Project Number invalido.");
      if (!startDate || !endDate) return setStatus("err", "Informe inicio e fim da sprint.");

      try {
        btn.disabled = true;
        clearStatus();
        setStatus("warn", "Conectando...");
        document.getElementById("status").innerHTML = '<span class="loader"></span>Buscando itens do Project V2...';

        const items = await fetchProjectItems(token, owner, projectNumber);
        const tasks = parseProjectItems(items, repo);
        if (!tasks.length) throw new Error("Nenhum card encontrado para os filtros atuais.");

        const model = buildBurndown(tasks, startDate, endDate);
        renderStats(model);
        renderChart(model);
        renderTable(model.tasks);

        document.getElementById("results").classList.remove("hidden");
      } catch (err) {
        setStatus("err", `Falha: ${err.message}`);
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
