services:
  api:
    build:
      context: ./backend
      dockerfile: infra/Dockerfile
      target: builder
    container_name: infra-api
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_URL: ${FRONTEND_PUBLIC_URL}
    restart: unless-stopped
    command: >
      sh -c "npm run prisma:generate &&
      npx prisma migrate deploy &&
      npm run start"
    ports:
      - "${API_HOST_PORT:-3001}:${API_PORT:-3000}"
    networks:
      - infra-net

  frontend:
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    container_name: infra-frontend
    environment:
      NODE_ENV: production
      API_BASE_URL: ${API_INTERNAL_BASE_URL:-http://infra-api:3000/api}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    networks:
      - infra-net

networks:
  infra-net:
    name: infra-net
